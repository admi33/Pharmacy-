<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Pharmacy Pro</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f9}
header{background:#1976d2;color:#fff;padding:16px;text-align:center;font-size:1.4rem}
.container{max-width:900px;margin:auto;padding:12px}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:12px;box-shadow:0 2px 5px rgba(0,0,0,.12)}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:8px;font-size:16px}
input{border:1px solid #ccc}
button{border:none;background:#1976d2;color:#fff}
.nav{display:flex;gap:8px}
.nav button{flex:1}
.hidden{display:none}
.item{border-top:1px solid #ddd;padding-top:8px;margin-top:8px}
@media(min-width:700px){.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}}
</style>
</head>
<body>
<header>Offline Pharmacy Pro</header>
<div class="container">
<div class="nav">
<button onclick="showLanding()">Landing</button>
<button onclick="showAdmin()">Admin</button>
</div>

<div id="landing" class="card">
<h3>Public Sales</h3>
<div id="publicList"></div>
</div>

<div id="login" class="card hidden">
<h3>Admin Login</h3>
<input id="pwd" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="admin" class="hidden">
<div class="card">
<h3>Add Product</h3>
<div class="grid">
<input id="name" placeholder="Product">
<input id="price" type="number" placeholder="Selling Price">
<input id="cost" type="number" placeholder="Cost Price">
<input id="stock" type="number" placeholder="Stock">
</div>
<button onclick="add()">Add Product</button>
</div>
<div class="card">
<h3>Inventory</h3>
<div id="adminList"></div>
</div>
</div>
</div>
<script>
const PASS="1234";
let items=JSON.parse(localStorage.getItem("items")||"[]");
let sales=JSON.parse(localStorage.getItem("sales")||"[]");
function save(){localStorage.setItem("items",JSON.stringify(items));localStorage.setItem("sales",JSON.stringify(sales));render();}
function showLanding(){landing.classList.remove("hidden");login.classList.add("hidden");admin.classList.add("hidden");}
function showAdmin(){landing.classList.add("hidden");login.classList.remove("hidden");}
function login(){if(pwd.value===PASS){login.classList.add("hidden");admin.classList.remove("hidden");render();}else alert("Wrong password");}
function add(){items.push({name:name.value,price:+price.value,cost:+cost.value,stock:+stock.value});save();}
function sold(i){if(items[i].stock>0){items[i].stock--;sales.push({name:items[i].name,date:Date.now()});save();}}
function render(){
publicList.innerHTML="";
adminList.innerHTML="";
items.forEach((x,i)=>{
publicList.innerHTML+=`<div class=item><b>${x.name}</b><br>Stock: ${x.stock}<button onclick="sold(${i})">Mark Sold</button></div>`;
adminList.innerHTML+=`<div class=item><b>${x.name}</b> | Stock ${x.stock} | Sell ${x.price} | Cost ${x.cost}</div>`;
});
}
render();
</script>
</body>
</html>
