// ── RECEIPT ──
function Receipt({ order, onClose }) {
  const printRef = useRef();
  const handlePrint = () => {
    const content = printRef.current.innerHTML;
    const win = window.open("", "_blank");
    win.document.write(`<html><head><title>Receipt - ${order.id}</title>
      <style>
        body { font-family: 'Courier New', monospace; width: 320px; margin: 0 auto; padding: 16px; font-size: 12px; }
        .center { text-align: center; } .divider { border-top: 1px dashed #333; margin: 8px 0; }
        .row { display: flex; justify-content: space-between; margin: 4px 0; }
        .bold { font-weight: bold; } .big { font-size: 15px; }
      </style></head><body>${content}</body></html>`);
    win.document.close();
    win.print();
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,35,71,0.55)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)" }}>
      <div style={{ background: "white", borderRadius: 16, width: 400, maxHeight: "90vh", overflow: "auto", boxShadow: "0 24px 64px rgba(15,35,71,0.25)" }}>
        <div style={{ padding: "20px 24px", borderBottom: `1px solid ${T.gray200}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, fontSize: 16, color: T.navyDeep }}>🧾 Receipt</span>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: T.gray500 }}>✕</button>
        </div>
        <div style={{ padding: 24 }}>
          <div ref={printRef} style={{ fontFamily: "'Courier New', monospace", fontSize: 13, lineHeight: 1.7 }}>
            <div style={{ textAlign: "center", marginBottom: 12 }}>
              <div style={{ fontWeight: "bold", fontSize: 15 }}>AGYEMANG BOAMAH LAWSON</div>
              <div>OTCMAS & Laboratory Services</div>
              <div>Ghana, West Africa</div>
              <div>+233 XX XXX XXXX</div>
            </div>
            <div style={{ borderTop: "1px dashed #333", margin: "8px 0" }} />
            <div style={{ display: "flex", justifyContent: "space-between" }}><span>Order ID:</span><span style={{ fontWeight: "bold" }}>{order.id}</span></div>
            <div style={{ display: "flex", justifyContent: "space-between" }}><span>Date:</span><span>{new Date(order.createdAt).toLocaleString()}</span></div>
            <div style={{ display: "flex", justifyContent: "space-between" }}><span>Type:</span><span style={{ textTransform: "capitalize" }}>{order.type}</span></div>
            {order.type === "pickup" && <div style={{ display: "flex", justifyContent: "space-between" }}><span>Pickup Code:</span><span style={{ fontWeight: "bold" }}>{order.customer.pickupCode}</span></div>}
            <div style={{ borderTop: "1px dashed #333", margin: "8px 0" }} />
            <div style={{ fontWeight: "bold", marginBottom: 4 }}>CUSTOMER</div>
            <div>{order.customer.name}</div>
            <div>{order.customer.phone}</div>
            {order.type === "delivery" && <div>{order.customer.address}</div>}
            <div style={{ borderTop: "1px dashed #333", margin: "8px 0" }} />
            <div style={{ fontWeight: "bold", marginBottom: 4 }}>ITEMS</div>
            {order.items.map((item, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between" }}>
                <span>{item.qty}× {item.name}</span>
                <span>{fmt(item.qty * item.price)}</span>

            <div style={{ borderTop: "1px dashed #333", margin: "8px 0" }} />
            <div style={{ display: "flex", justifyContent: "space-between" }}><span>Subtotal:</span><span>{fmt(order.items.reduce((s, i) => s + i.qty * i.price, 0))}</span></div>
            {order.type === "delivery" && <div style={{ display: "flex", justifyContent: "space-between" }}><span>Delivery:</span><span>{fmt(15)}</span></div>}

// ── NEW ORDER MODAL ──
function NewOrderModal({ products, onSave, onClose }) {
  const [type, setType] = useState("delivery");
  const [customer, setCustomer] = useState({ name: "", phone: "", address: "", pickupCode: "" });
  const [items, setItems] = useState([{ productId: "", qty: 1 }]);
  const [paymentStatus, setPaymentStatus] = useState("unpaid");

  const addItem = () => setItems([...items, { productId: "", qty: 1 }]);
  const removeItem = (i) => setItems(items.filter((_, idx) => idx !== i));
  const updateItem = (i, field, val) => { const arr = [...items]; arr[i][field] = val; setItems(arr); };

  const totalAmount = items.reduce((sum, it) => {
    const p = products.find(p => p.id === Number(it.productId));
    return sum + (p ? p.price * Number(it.qty) : 0);
  }, 0) + (type === "delivery" ? 15 : 0);

  const handleSave = () => {
    if (!customer.name || !customer.phone) return alert("Customer name and phone required.");
    if (type === "delivery" && !customer.address) return alert("Delivery address required.");
    if (items.some(i => !i.productId)) return alert("Select a product for each line.");
    const orderItems = items.map(it => {
      const p = products.find(p => p.id === Number(it.productId));
      return { productId: p.id, name: p.name, qty: Number(it.qty), price: p.price };
    });
    onSave({
      id: `ORD-00${nextOrderId++}`, type, status: "pending", paymentStatus,
      customer: type === "delivery"
        ? { name: customer.name, phone: customer.phone, address: customer.address }
        : { name: customer.name, phone: customer.phone, pickupCode: `PKP-${Math.floor(1000 + Math.random() * 9000)}` },
      items: orderItems, total: totalAmount, createdAt: now(),
    });
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,35,71,0.55)", zIndex: 998, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)" }}>
      <div style={{ background: "white", borderRadius: 16, width: 560, maxHeight: "90vh", overflow: "auto", boxShadow: "0 24px 64px rgba(15,35,71,0.25)" }}>
        <div style={{ padding: "20px 24px", borderBottom: `1px solid ${T.gray200}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: T.navyDeep, borderRadius: "16px 16px 0 0" }}>
          <span style={{ fontWeight: 700, fontSize: 16, color: "white" }}>➕ New Order</span>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "rgba(255,255,255,0.6)" }}>✕</button>
        </div>
        <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 18 }}>
          <div>
            <label style={s.label}>Order Type</label>
            <div style={{ display: "flex", gap: 10 }}>
              {["delivery", "pickup"].map(t => (
                <button key={t} onClick={() => setType(t)} style={{ flex: 1, padding: "10px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", border: `2px solid ${type === t ? T.navy : T.gray200}`, background: type === t ? T.blueLight : "white", color: type === t ? T.navyDeep : T.gray500 }}>
                  {t === "delivery" ? "🚚 Delivery" : "🏪 Customer Pickup"}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={s.label}>Customer Name</label>
            <input style={s.input} placeholder="Full name" value={customer.name} onChange={e => setCustomer({ ...customer, name: e.target.value })} />
          </div>
          <div>
            <label style={s.label}>Phone Number</label>
            <input style={s.input} placeholder="e.g. 0244123456" value={customer.phone} onChange={e => setCustomer({ ...customer, phone: e.target.value })} />
          </div>
          {type === "delivery" && (
            <div>
              <label style={s.label}>Delivery Address</label>
              <input style={s.input} placeholder="Street address, city" value={customer.address} onChange={e => setCustomer({ ...customer, address: e.target.value })} />
            </div>
          )}
          <div>
            <label style={s.label}>Products Ordered</label>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {items.map((it, i) => (
                <div key={i} style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <select style={{ ...s.input, flex: 3 }} value={it.productId} onChange={e => updateItem(i, "productId", e.target.value)}>
                    <option value="">— Select product —</option>
                    {products.filter(p => p.stock > 0).map(p => (
                      <option key={p.id} value={p.id}>{p.image} {p.name} — GHS {p.price}</option>
                    ))}
                  </select>
                  <input type="number" min="1" style={{ ...s.input, flex: 1, width: 60 }} value={it.qty} onChange={e => updateItem(i, "qty", e.target.value)} />
                  {items.length > 1 && <button onClick={() => removeItem(i)} style={{ ...s.btn("ghost"), padding: "9px 12px", color: T.red }}>✕</button>}
                </div>
              ))}
              <button onClick={addItem} style={{ ...s.btn("ghost"), alignSelf: "flex-start", fontSize: 12 }}>+ Add Item</button>
            </div>
          </div>
          <div>
            <label style={s.label}>Payment Status</label>
            <select style={s.input} value={paymentStatus} onChange={e => setPaymentStatus(e.target.value)}>
              <option value="unpaid">Unpaid</option>
              <option value="paid">Paid</option>
            </select>
          </div>
          <div style={{ background: T.blueLight, borderRadius: 10, padding: "12px 16px", display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 15, color: T.navyDeep }}>
            <span>Total Amount</span>
            <span>{fmt(totalAmount)}</span>
          </div>
          <div style={{ display: "flex", gap: 10, paddingTop: 4 }}>
            <button onClick={handleSave} style={{ ...s.btn("primary"), flex: 1, justifyContent: "center" }}>Save Order</button>
            <button onClick={onClose} style={{ ...s.btn("ghost"), flex: 1, justifyContent: "center" }}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ──
function Dashboard({ products, orders }) {
  const totalRevenue = orders.filter(o => o.paymentStatus === "paid").reduce((s, o) => s + o.total, 0);
  const lowStock = products.filter(p => p.stock < 40);
  const pendingOrders = orders.filter(o => o.status === "pending").length;
  const stats = [
    { label: "Total Revenue", value: fmt(totalRevenue), icon: "💰", color: T.green },
    { label: "Total Orders", value: orders.length, icon: "📦", color: T.navyMid },
    { label: "Pending Orders", value: pendingOrders, icon: "⏳", color: "#f59e0b" },
    { label: "Low Stock Items", value: lowStock.length, icon: "⚠️", color: T.red },
  ];
  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: T.navyDeep, marginBottom: 20 }}>Dashboard Overview</h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginBottom: 28 }}>
        {stats.map(st => (
          <div key={st.label} style={{ ...s.card, borderLeft: `4px solid ${st.color}`, padding: 18 }}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>{st.icon}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: T.navyDeep }}>{st.value}</div>
            <div style={{ fontSize: 12, color: T.gray500, marginTop: 3 }}>{st.label}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div style={s.card}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: T.navyDeep, marginBottom: 14 }}>⚠️ Low Stock Alert</h3>
          {lowStock.length === 0 ? <p style={{ color: T.gray500, fontSize: 13 }}>All products are well stocked.</p> : lowStock.map(p => (
            <div key={p.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.gray100}`, fontSize: 13 }}>
              <span>{p.image} {p.name}</span>
              <span style={s.badge("red")}>{p.stock} left</span>
            </div>
          ))}
        </div>
        <div style={s.card}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: T.navyDeep, marginBottom: 14 }}>📋 Recent Orders</h3>
          {orders.slice(-5).reverse().map(o => (
            <div key={o.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.gray100}`, fontSize: 13 }}>
              <div><span style={{ fontWeight: 600 }}>{o.id}</span> — {o.customer.name}</div>
              <span style={s.badge(o.status === "completed" ? "green" : o.status === "pending" ? "" : "blue")}>{o.status}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ProductsAdmin({ products, setProducts }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: "", category: "", price: "", stock: "", image: "💊" });
  const [search, setSearch] = useState("");
  const emojis = ["💊", "🔴", "⚪", "🍊", "🌟", "☀️", "⚡", "🤧", "🍯", "👃", "🫁", "💧", "✨", "🎀", "🟤", "🩹", "🌡️", "🌿", "🟢", "🫚"];

  const openNew = () => { setForm({ name: "", category: "", price: "", stock: "", image: "💊" }); setEditing(null); setShowForm(true); };
  const openEdit = (p) => { setForm({ name: p.name, category: p.category, price: p.price, stock: p.stock, image: p.image }); setEditing(p.id); setShowForm(true); };
  const handleSave = () => {
    if (!form.name || !form.price || !form.stock) return alert("Name, price and stock are required.");
    if (editing) {
      setProducts(products.map(p => p.id === editing ? { ...p, ...form, price: Number(form.price), stock: Number(form.stock) } : p));
    } else {
      setProducts([...products, { id: Date.now(), ...form, price: Number(form.price), stock: Number(form.stock) }]);
    }
    setShowForm(false);
  };
  const handleDelete = (id) => { if (window.confirm("Delete this product?")) setProducts(products.filter(p => p.id !== id)); };
  const filtered = products.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.category.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: T.navyDeep }}>Products</h2>
        <button onClick={openNew} style={s.btn("primary")}>+ Add Product</button>
      </div>
      <input style={{ ...s.input, marginBottom: 16, maxWidth: 300 }} placeholder="Search products…" value={search} onChange={e => setSearch(e.target.value)} />
      <div style={s.card}>

// ── ORDERS ──
function Orders({ orders, setOrders, products, role }) {
  const [receipt, setReceipt] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const STATUS_FLOW = ["pending", "processing", "ready", "completed"];
  const advance = (id) => {
    setOrders(orders.map(o => {
      if (o.id !== id) return o;
      const idx = STATUS_FLOW.indexOf(o.status);
      return idx < STATUS_FLOW.length - 1 ? { ...o, status: STATUS_FLOW[idx + 1] } : o;
    }));
  };
  const togglePayment = (id) => setOrders(orders.map(o => o.id === id ? { ...o, paymentStatus: o.paymentStatus === "paid" ? "unpaid" : "paid" } : o));

  const statusColor = { pending: "", processing: "blue", ready: "green", completed: "green" };
  const filtered = orders.filter(o => {
    const matchFilter = filter === "all" || o.status === filter || o.type === filter;
    const matchSearch = o.id.toLowerCase().includes(search.toLowerCase()) || o.customer.name.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: T.navyDeep }}>Orders</h2>
        {role === "employee" && <button onClick={() => setShowNew(true)} style={s.btn("primary")}>+ New Order</button>}
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <input style={{ ...s.input, maxWidth: 220 }} placeholder="Search by order ID or customer…" value={search} onChange={e => setSearch(e.target.value)} />
        {["all", "pending", "processing", "ready", "completed", "delivery", "pickup"].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{ padding: "7px 14px", borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${filter === f ? T.navy : T.gray200}`, background: filter === f ? T.navy : "white", color: filter === f ? "white" : T.gray700 }}>
            {f.charAt(0).toUpperCase() + f.slice(1)}
          </button>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.length === 0 && <div style={{ ...s.card, textAlign: "center", color: T.gray500, padding: 40 }}>No orders found.</div>}
        {filtered.map(o => (
          <div key={o.id} style={{ ...s.card, padding: "16px 20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                  <span style={{ fontWeight: 700, fontSize: 15, color: T.navyDeep }}>{o.id}</span>
                  <span style={s.badge(statusColor[o.status])}>{o.status}</span>
                  <span style={s.badge(o.type === "delivery" ? "blue" : "")}>{o.type === "delivery" ? "🚚 Delivery" : "🏪 Pickup"}</span>
                  <span style={s.badge(o.paymentStatus === "paid" ? "green" : "red")}>{o.paymentStatus}</span>
                </div>
                <div style={{ fontSize: 13, color: T.gray500 }}>
                  <span style={{ fontWeight: 600, color: T.text }}>{o.customer.name}</span> · {o.customer.phone}
                  {o.type === "delivery" && ` · 📍 ${o.customer.address}`}
                  {o.type === "pickup" && ` · 🔑 ${o.customer.pickupCode}`}
                </div>
                <div style={{ marginTop: 6, fontSize: 12, color: T.gray500 }}>
                  {o.items.map(i => `${i.qty}× ${i.name}`).join("  ·  ")}
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: T.navyDeep }}>{fmt(o.total)}</div>
                <div style={{ fontSize: 11, color: T.gray500 }}>{new Date(o.createdAt).toLocaleString()}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
              {o.status !== "completed" && (
                <button onClick={() => advance(o.id)} style={{ ...s.btn("primary"), fontSize: 12, padding: "7px 14px" }}>
                  → {STATUS_FLOW[STATUS_FLOW.indexOf(o.status) + 1] || "Done"}
                </button>
              )}
              <button onClick={() => togglePayment(o.id)} style={{ ...s.btn("ghost"), fontSize: 12, padding: "7px 14px" }}>
                {o.paymentStatus === "paid" ? "Mark Unpaid" : "✓ Mark Paid"}
              </button>
              <button onClick={() => setReceipt(o)} style={{ ...s.btn("ghost"), fontSize: 12, padding: "7px 14px" }}>🧾 Receipt</button>
            </div>
          </div>
        ))}
      </div>
      {receipt && <Receipt order={receipt} onClose={() => setReceipt(null)} />}
      {showNew && <NewOrderModal products={products} onSave={(o) => { setOrders([...orders, o]); setShowNew(false); }} onClose={() => setShowNew(false)} />}
    </div>
  );
}

function EmployeesAdmin() {
  const [employees, setEmployees] = useState(EMPLOYEES);

// ── REPORTS ──
function Reports({ orders, products }) {
  const paid = orders.filter(o => o.paymentStatus === "paid");
  const totalRev = paid.reduce((s, o) => s + o.total, 0);
  const deliveries = orders.filter(o => o.type === "delivery").length;
  const pickups = orders.filter(o => o.type === "pickup").length;
  const completed = orders.filter(o => o.status === "completed").length;

  const topProducts = products.map(p => {
    const sold = orders.flatMap(o => o.items).filter(i => i.productId === p.id).reduce((s, i) => s + i.qty, 0);
    return { ...p, sold };
  }).sort((a, b) => b.sold - a.sold).slice(0, 6);

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: T.navyDeep, marginBottom: 20 }}>Reports</h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginBottom: 24 }}>
        {[
          { label: "Total Revenue (Paid)", value: fmt(totalRev), icon: "💰" },
          { label: "Delivery Orders", value: deliveries, icon: "🚚" },
          { label: "Pickup Orders", value: pickups, icon: "🏪" },
          { label: "Completed Orders", value: completed, icon: "✅" },
          { label: "Pending / Processing", value: orders.filter(o => o.status !== "completed").length, icon: "⏳" },
          { label: "Unpaid Orders", value: orders.filter(o => o.paymentStatus === "unpaid").length, icon: "💳" },
        ].map(st => (
          <div key={st.label} style={{ ...s.card, padding: 18 }}>
            <div style={{ fontSize: 24 }}>{st.icon}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.navyDeep, marginTop: 6 }}>{st.value}</div>
            <div style={{ fontSize: 12, color: T.gray500 }}>{st.label}</div>
          </div>
        ))}
      </div>
      <div style={s.card}>
        <h3 style={{ fontSize: 14, fontWeight: 700, color: T.navyDeep, marginBottom: 14 }}>🏆 Top Selling Products</h3>
        <table style={s.table}>
          <thead><tr><th style={s.th}>Product</th><th style={s.th}>Category</th><th style={s.th}>Price</th><th style={s.th}>Units Sold</th><th style={s.th}>Revenue</th></tr></thead>
          <tbody>
            {topProducts.map(p => (
              <tr key={p.id}>
                <td style={s.td}>{p.image} {p.name}</td>
                <td style={s.td}><span style={s.badge("blue")}>{p.category}</span></td>
                <td style={s.td}>{fmt(p.price)}</td>
                <td style={s.td}><strong>{p.sold}</strong></td>
                <td style={s.td}>{fmt(p.sold * p.price)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

                {items.map(i => <li key={i}><a href="#" style={{ color: "rgba(255,255,255,0.6)", textDecoration: "none", fontSize: 13 }}>{i}</a></li>)}
              </ul>
            </div>
          ))}
        </div>
        <div style={{ borderTop: "1px solid rgba(255,255,255,0.1)", paddingTop: 24, display: "flex", justifyContent: "space-between", fontSize: 12 }}>
          <span>© 2026 Agyemang Boamah Lawson OTCMAS & Laboratory Services. All rights reserved.</span>
          <span>Built with <span style={{ color: T.greenLight }}>❤</span> for Ghana's health</span>
        </div>
      </footer>
    </div>
  );
}

// ── ROOT APP ──
function PharmacyManagement() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [products, setProducts] = useState(INIT_PRODUCTS);
  const [orders, setOrders] = useState(INIT_ORDERS);
  const [showLoginDropdown, setShowLoginDropdown] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const logoRef = useRef(null);

  const handleLogoClick = () => setShowLoginDropdown(v => !v);

  const loginAs = (r) => {
    setRole(r);
    setPage(r === "admin" ? "dashboard" : "orders");
    setShowLoginDropdown(false);
  };

  const LoginDropdown = () => (
    showLoginDropdown ? (
      <>
        <div onClick={() => setShowLoginDropdown(false)} style={{ position: "fixed", inset: 0, zIndex: 199 }} />
        <div style={{ position: "fixed", top: 72, left: 16, zIndex: 200, background: "white", borderRadius: 14, width: 260, boxShadow: "0 16px 48px rgba(15,35,71,0.22)", overflow: "hidden", border: `1px solid ${T.gray200}`, animation: "fadeDown .18s ease" }}>
          <style>{`@keyframes fadeDown { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }`}</style>
          <div style={{ background: T.navyDeep, padding: "16px 20px" }}>
            <div style={{ color: "white", fontWeight: 700, fontSize: 14 }}>Staff Portal</div>
            <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 11, marginTop: 2 }}>Select your role to sign in</div>
          </div>
          <div style={{ padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            <button onClick={() => loginAs("admin")} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 10, border: `1.5px solid ${T.gray200}`, background: "white", cursor: "pointer", textAlign: "left", width: "100%", transition: "all .15s" }}
              onMouseEnter={e => { e.currentTarget.style.background = T.blueLight; e.currentTarget.style.borderColor = T.navy; }}
              onMouseLeave={e => { e.currentTarget.style.background = "white"; e.currentTarget.style.borderColor = T.gray200; }}>
              <div style={{ width: 36, height: 36, borderRadius: 8, background: T.blueLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>🔐</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.navyDeep }}>Admin</div>
                <div style={{ fontSize: 11, color: T.gray500 }}>Full access — products, reports, staff</div>
              </div>
            </button>
            <button onClick={() => loginAs("employee")} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 10, border: `1.5px solid ${T.gray200}`, background: "white", cursor: "pointer", textAlign: "left", width: "100%", transition: "all .15s" }}
              onMouseEnter={e => { e.currentTarget.style.background = T.greenPale; e.currentTarget.style.borderColor = T.green; }}
              onMouseLeave={e => { e.currentTarget.style.background = "white"; e.currentTarget.style.borderColor = T.gray200; }}>
              <div style={{ width: 36, height: 36, borderRadius: 8, background: T.greenPale, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>👤</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.navyDeep }}>Employee</div>
                <div style={{ fontSize: 11, color: T.gray500 }}>Orders & customer management</div>
              </div>
            </button>
          </div>
          <div style={{ padding: "8px 20px 14px", fontSize: 11, color: T.gray500, textAlign: "center" }}>Demo mode — no password required</div>
        </div>
      </>
    ) : null
  );

  if (!role) {
    return (
      <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif" }}>
        <LoginDropdown />
        <PublicSite onLogoClick={handleLogoClick} logoRef={logoRef} />
      </div>
    );
  }

  const adminNav = [
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "products", label: "Products", icon: "💊" },
    { id: "orders", label: "Orders", icon: "📦" },
    { id: "employees", label: "Employees", icon: "👥" },
    { id: "reports", label: "Reports", icon: "📈" },
  ];
  const employeeNav = [{ id: "orders", label: "Orders", icon: "📦" }];
  const nav = role === "admin" ? adminNav : employeeNav;

  const pageComponents = {
    dashboard: <Dashboard products={products} orders={orders} />,
    products: <ProductsAdmin products={products} setProducts={setProducts} />,
    orders: <Orders orders={orders} setOrders={setOrders} products={products} role={role} />,
    employees: <EmployeesAdmin />,
    reports: <Reports orders={orders} products={products} />,
  };

  const SidebarContent = () => (
    <>
      <div style={s.sidebarLogo}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg, ${T.green}, ${T.navyMid})`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 16, color: "white" }}>A</div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "white" }}>ABL Pharmacy</div>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.45)", textTransform: "uppercase", letterSpacing: "0.8px" }}>Management</div>
          </div>
        </div>
        <div style={{ marginTop: 10, fontSize: 11, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.8px" }}>
          {role === "admin" ? "🔐 Admin" : "👤 Employee"}
        </div>
      </div>
      <nav style={{ flex: 1, padding: "12px 0" }}>
        {nav.map(n => (
          <div key={n.id} style={s.navItem(page === n.id)} onClick={() => { setPage(n.id); setSidebarOpen(false); }}>
            <span>{n.icon}</span><span>{n.label}</span>
          </div>
        ))}
      </nav>
      <div style={{ padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
        <button onClick={() => { setRole(null); setShowLoginDropdown(false); setSidebarOpen(false); }} style={{ ...s.navItem(false), margin: 0, width: "100%", background: "rgba(224,48,48,0.12)", color: "#ff8080" }}>
          <span>🚪</span><span>Sign Out</span>
        </button>
      </div>
    </>
  );

  return (
    <>
      <style>{`
        @media (max-width: 640px) {
          .dash-sidebar-desktop { display: none !important; }
          .dash-topbar { display: flex !important; }
          .dash-main { padding: 16px !important; }
        }
        @media (min-width: 641px) {
          .dash-topbar { display: none !important; }
          .dash-sidebar-desktop { display: flex !important; }
        }
        @keyframes slideInLeft { from { transform: translateX(-100%) } to { transform: translateX(0) } }
      `}</style>

      {/* MOBILE TOP BAR */}
      <div className="dash-topbar" style={{ display: "none", position: "sticky", top: 0, zIndex: 100, background: T.navyDeep, height: 56, padding: "0 16px", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 12px rgba(0,0,0,0.2)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: `linear-gradient(135deg, ${T.green}, ${T.navyMid})`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 14, color: "white" }}>A</div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "white", lineHeight: 1.2 }}>ABL Pharmacy</div>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.45)", textTransform: "uppercase", letterSpacing: "0.5px" }}>{role === "admin" ? "Admin" : "Employee"}</div>
          </div>
        </div>
        <button onClick={() => setSidebarOpen(true)} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "white", cursor: "pointer", borderRadius: 8, width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>☰</button>
      </div>

      {/* MOBILE DRAWER */}
      {sidebarOpen && (
        <>
          <div onClick={() => setSidebarOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(15,35,71,0.55)", zIndex: 200, backdropFilter: "blur(2px)" }} />
          <div style={{ position: "fixed", top: 0, left: 0, width: 260, height: "100vh", background: T.navyDeep, zIndex: 201, display: "flex", flexDirection: "column", boxShadow: "4px 0 32px rgba(0,0,0,0.3)", animation: "slideInLeft .22s ease" }}>
            <div style={{ display: "flex", justifyContent: "flex-end", padding: "12px 14px 0" }}>
              <button onClick={() => setSidebarOpen(false)} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "white", cursor: "pointer", borderRadius: 6, width: 32, height: 32, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
            </div>
            <SidebarContent />
          </div>
        </>
      )}

      <div style={{ ...s.app, display: "flex" }}>
        <div className="dash-sidebar-desktop" style={{ ...s.sidebar, flexDirection: "column" }}>
          <SidebarContent />
        </div>
        <div className="dash-main" style={s.main}>
          {pageComponents[page] || pageComponents["orders"]}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PharmacyManagement />);
</script>
</body>
</html>
